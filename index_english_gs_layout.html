<script>
    
    // ** design ** //
    var key_feature = 'wood'
    var cat_label = ['set1', 'set2']
    var random_cat_label = _.sample(cat_label, 2)

    var room_set = ['fix_bedroom_lighting13_set1_17x17', 'fix_bedroom_lighting13_set2_17x17']
    var learning_set = room_set[0];
    var transfer_set = room_set[1];
    var practice_set = 'practice_bedroom_set2_17x17'
    var space_rot = 0; // Math.random()*360;    
    var grid_size = 17;
    var circle_on = true;
    if(circle_on){ var canvas_shape = 'circle' }
    var econd = make_condition_flexible(
        grid_size, key_feature, random_cat_label, learning_set, transfer_set, circle_on
    );
    var pcond = make_condition_flexible(
        grid_size, key_feature, random_cat_label, practice_set, practice_set, circle_on
    )
    var n_block = econd.n_block


    // ** initialize ** //
    const jsPsych = initJsPsych();

    // ** image preloading ** //
    // 지시문, learning, transfer, prac set 프리로딩함
    // var preload_inst = {
    //     type: jsPsychPreload,
    //     images: ['stimuli/instruction/session1_p2_rv.png',
    //     'stimuli/instruction/session2_p3_rv.png', 'stimuli/instruction/session3_p4_rv.png',
    //     'stimuli/instruction/session4_p5_rv.png'],
    //     data: {disp_type: 'preload_inst'}
    // }
    var images_learning = [];
    var num_img = grid_size*grid_size
    for (var i=0; i<num_img; i++){   
        images_learning.push("stimuli/"+learning_set+"/"+("000000"+i).slice(-6)+".webp")
    }
    images_learning.push("stimuli/"+learning_set+"/"+"999999.webp")
    var preload_learning = {
        type: jsPsychPreload, 
        images: images_learning,
        data: {disp_type: 'preload_learning'}
    }
    var images_transfer = [];    
    for (var i=0; i<num_img; i++){  
        images_transfer.push("stimuli/"+transfer_set+"/"+("000000"+i).slice(-6)+".webp")
    }    
    images_transfer.push("stimuli/"+transfer_set+"/"+"999999.webp")
    var preload_transfer = {
        type: jsPsychPreload, 
        images: images_transfer,
        data: {disp_type: 'preload_transfer'}
    }
    var images_prac = [];
    for (var i=0; i<num_img; i++){   
        images_prac.push("stimuli/"+practice_set+"/"+("000000"+i).slice(-6)+".webp")
    }
    images_prac.push("stimuli/"+practice_set+"/"+"999999.webp")
    var preload_prac = {
        type: jsPsychPreload, 
        images: images_prac, 
        data: {disp_type: 'preload_practice'}
    }

    // ** resizing ** // 
    var chinrest_trial = {
        type: jsPsychVirtualChinrest,
        blindspot_reps: 0,
        resize_units: "cm",
        pixels_per_unit: 50,
        item_path: null
    };

    // // * Prolific information * // -> GS: 프롤리픽에 업로드 시에 활성화 시키기
    // var subject_id = jsPsych.data.getURLVariable('PROLIFIC_PID');
    // var study_id = jsPsych.data.getURLVariable('STUDY_ID');
    // var session_id = jsPsych.data.getURLVariable('SESSION_ID');
    // jsPsych.data.addProperties({
    //     subject_id: subject_id,
    //     study_id: study_id,
    //     session_id: session_id
    // });
    
    // ** instruction ** //
    var inst_welcome = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="max-width:1000px; margin:20px 50px; text-align:center; font-family:Arial, sans-serif;">
                <h1 style="font-size:50px; font-weight:bold;">Welcome to the Study!</h1>
                <p> In this study, you will complete <strong>4 brief sessions</strong>, each featuring a different task.</p>
                <p> Before we begin, please read the following scenario carefully.</p>
                <div style="border:2px solid crimson; border-radius:10px; padding:30px 30px; text-align:center; margin:0 100px;">
                    <p style="font-style:italic; font-size:20px; margin-bottom:16px; color: crimson;"><strong>Scenario:</strong></p>
                    <p style="font-style:italic; font-size:16px; line-height:1.7; margin:0;">
                        Imagine you are working for a web design agency.<br>
                        Your client, 280 Realty Group, has requested a web brochure for their newly opened condominium.<br>
                        They have specifically asked for high-quality photos of their showrooms.<br>
                        To meet this request, your photography team has prepared two sets of bedroom images,each featuring a slightly different style.
                    </p>
                </div>
                <p> Please click the button below to view the instructions for <strong>Session 1</strong> </p>
            </div>`,
        choices: ['next'],
        data: {disp_type: 'inst_welcome'}
    }
    var inst_session1 = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="max-width:1000px; margin:20px 50px; font-family:Arial, sans-serif;">
                <h1 style="font-size:40px; font-weight:bold; text-align:center;"> Session 1</h1>
                <div style="text-align: left">
                    <p style="text-decoration:underline; text-align:left;">Scenario continued:</p>
                    <p style="font-style:italic; font-size:16px; line-height:1.3;">
                        Last night, the image folders of the two sets were acidentally merged... <br>
                        The photography team has asked you to help sort the images back into their correct folders.<br>
                        When asked about the style that defines each photo set, they mentioned it's difficult verbally, but they can indentify them visually.
                    </p>
                </div>
                <div style="border:2px solid black; padding:30px; text-align:center; margin:0 auto 24px; max-width:420px;">
                    <img src="stimuli/practice_bedroom1.webp" style="width:120px; height:90px; object-fit:contain;">
                    <p style="margin:0; font-size:16px;">Press 'e' for Set 1 and 'i' for Set 2</p>
                </div>
                <p style="text-align:center; font-size:16px; line-height:1.3; margin-bottom:0px;">
                    In this session, you will see multiple images one by one. For each image, you must decide which set it belongs to by pressing either
                    <strong>'e'</strong> or <strong>'i'</strong>.
                </p>
                <p style="text-align:center; font-size:16px; line-height:1.3; margin-bottom:0px;"> 
                    After each response, a photography staff member will provide feedback on whether you were <strong>correct</strong> or <strong>not</strong>.
                    Based on this feedback, try to sort as many images correctly as possible.
                </p>
                <p style="text-align:center; color: crimson; font-size:20px;">
                    <strong>Please try to respond as accurately and quickly as possible.</strong><br>
                    If you do not responded within <strong>2 seconds</strong>, it will move on to the next image.
                </p>
                <p style="text-align:center; font-size:16px;">You will perform this task for <strong>120 images over 5 rounds.</strong></p>
            </div>`,
        choices: ['start'],
        data: {disp_type: 'inst_session1'}
    }
    var inst_session2 = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="max-width:1000px; margin:20px 50px; font-family:Arial, sans-serif;">
                <h1 style="font-size:40px; font-weight:bold; text-align:center;">Session 2</h1>
                <div style="text-align: left">
                    <p style="text-decoration:underline; text-align:left;">Scenario continued:</p>
                    <p style="font-style:italic; font-size:16px; line-height:1.3;">
                        You've successfully sorted all the images!<br> Next, the team needs to pick out the most memorable room photos for the brochure.
                        To identify which ones are more memorable, they've designed a quick experiment.
                    </p>
                </div>
                
                <div style="width:800px; height:300px; background: lightgray; margin:0 auto 10px; align-items:center;">[session2 image]</div>

                <p style="text-align:center; font-size:16px; line-height:1.7;">
                    This task will be repeated <strong>171 times, with 4 breaks.</strong><br>
                    Before you begin, let's try <strong>3 practice trials.</strong>
                </p>
            </div>`,
        choices: ['start'],
        data: {disp_type: 'inst_session2'}
    }
    var inst_session3 = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="max-width:1000px; margin:20px 50px; font-family:Arial, sans-serif;">
                <h1 style="font-size:40px; font-weight:bold; text-align:center;">Session 3</h1>
                <div style="text-align: left">
                    <p style="text-decoration:underline; text-align:left;">Scenario continued:</p>
                    <p style="font-style:italic; font-size:16px; line-height:1.3;">
                        While you were working on the experiment, the photography team finished preparing images of another bedroom.
                        You'll now complete the same memory task using these new bedroom images.
                    </p>
                </div>
                
                <div style="width:800px; height:300px; background: lightgray; margin:0 auto 10px; align-items:center;">[session3 image]</div>

                <p style="text-align:center; font-size:16px; line-height:1.7;">
                    You will repeat this trial <strong>171 times</strong> and will be given <strong>4 breaks.</strong>
                </p>
            </div>`,
        choices: ['start'],
        data: {disp_type: 'inst_session3'}
    }
    var inst_session4 = {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="max-width:1000px; margin:20px 50px; font-family:Arial, sans-serif;">
                <h1 style="font-size:40px; font-weight:bold; text-align:center;">Session 4</h1>
                <div style="text-align: left">
                    <p style="text-decoration:underline; text-align:left;">Scenario continued:</p>
                    <p style="font-style:italic; font-size:16px; line-height:1.3;">
                        The photography team asked you to sort out some images one more time.<br>
                        These images are the bedrooms you just saw in the previous session. You can classify them based on the style you learned in the first session.
                        This time, you perform this task <strong>without feedback.</strong>
                    </p>
                </div>

                <div style="border:2px solid black; padding:30px; text-align:center; margin:0 auto 24px; max-width:420px;">
                    <img src="stimuli/practice_bedroom2.webp" style="width:120px; height:90px; object-fit:contain;">
                    <p style="margin:0; font-size:16px;">Press 'e' for Set 1 and 'i' for Set 2</p>
                </div>
                <p style="text-align:center; font-size:16px; line-height:1.3; margin-bottom:0px;">This session faollows the same procedure as Session 1</p>
                <p style="text-align:center; color: crimson; font-size:20px;">
                    <strong>Please try to respond as accurately and quickly as possible.</strong><br>
                    If you do not responded within <strong>2 seconds</strong>, it will move on to the next image.
                </p>
                <p style="text-align:center; font-size:16px;">You will perform this task for <strong>18 images.</strong></p>
            </div>`,
        choices: ['start'],
        data: {disp_type: 'inst_session4'}
    }

    // ** initial learn ** //    
    var learn_display = {
        type: jsPsychImageKeyboardResponse,
        stimulus: jsPsych.timelineVariable('img_path'),
        choices: ['e', 'i'],
        data: {
            disp_type: 'learn_display',
            key_feature: jsPsych.timelineVariable('key_feature'),
            answer: jsPsych.timelineVariable('label'),
            position: jsPsych.timelineVariable('position'),
            stim_coord: jsPsych.timelineVariable('stim_coord'),
            stim_idx: jsPsych.timelineVariable('stim_idx')
        },
        prompt: '<p>Press "e" for Set 1 and "i" for Set 2.</p>',
        trial_duration: 2000,
        on_finish: function(data){            
            if(jsPsych.timelineVariable('label')=="set1"){
                var correct_key = "e"
            }else if(jsPsych.timelineVariable('label')=="set2"){
                var correct_key = "i"
            }              
            if(data.response == null){
                data.correct = 'late';
            } else {
                if(jsPsych.pluginAPI.compareKeys(data.response, correct_key)){
                    data.correct = 'correct';
                } else {
                    data.correct = 'wrong';
                }
            } 
        }
    } 
    var feedback_display = {
        type:jsPsychHtmlKeyboardResponse,
        stimulus: function(){
            var last_trial_correct = jsPsych.data.get().last(1).values()[0].correct;  
            if(last_trial_correct == 'correct') {
                var fb = '<p><mark style="color:green; background:none; font-size:30pt;">Correct!</mark></br></p>'         
            } else if(last_trial_correct == 'wrong'){
                var fb = '<p><mark style="color:red; background:none; font-size:30pt;">Wrong...</mark></br></p>'
            } else if(last_trial_correct == 'late'){
                var fb = '<p><mark style="color:brown; background:none; font-size:30pt;">Too slow</mark></p>'
            }
            return fb
        },
        trial_duration: 1000,
        choices: "NO_KEYS",
        data: {disp_type: "learn_feedback"}
    }

    var learning_prac = { //include - depends on the exp duration 
        timeline: [learn_display, feedback_display],
        timeline_variables: pcond.learning.b1.slice(0,5),
        randomize_ordr: true
    }

    for(r=0; r<n_block; r++){
        this['learn_main'+(r+1)] = {
            timeline: [learn_display, feedback_display],
            timeline_variables: econd.learning['b'+(r+1)],
            // timeline_variables: _.shuffle(econd.learning['r'+(r+1)]).slice(0,5),
            randomize_order: true
        }
    }
    for(r=0; r<n_block; r++){     
        if(r!=(n_block-1)){
            this['learn_main_break'+(r+1)] = {                
                type: jsPsychHtmlButtonResponse,
                stimulus: '<div style="font-size:20px;">This is the end of round '+(r+1)+'.</br>'+
                    'You have '+(n_block-r-1)+' more round(s) to go.</br>'+
                    'Take a break and press the button to proceed.</br></br></div>',               
                choices: ['start'],
                data: {disp_type: 'learn_main_break'}
            }
        } else {
            this['learn_main_break'+(r+1)] = {                
                type: jsPsychHtmlButtonResponse,
                stimulus: '<div style="font-size:20px;">This is the end of round'+(r+1)+'.</br>'+
                'Take a break and press the button to move on to the next session.</br></br></div>',                    
                choices: ['next'],
                data: {disp_type: 'learn_main_break'}
            }

        }                       
    }
    // ** reconstruction ** //
    var fixation = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<p style="font-size: 48px;">+</p>',
        choices: "NO_KEYS",
        trial_duration: 1000,
        data: {disp_type: 'fixation'}
    }
    var blank = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: ' ',
        choices: "NO_KEYS",
        trial_duration: 1000,
        data: {disp_type: 'blank'}
    }
    var target_display = {
        type: jsPsychImageKeyboardResponse,
        stimulus: jsPsych.timelineVariable('img_path'),
        choices: "NO_KEYS",
        trial_duration: 200,
        data: {disp_type: 'recon_target'}
    }
    var reconstruction = {
        type: jsPsychReconstruct_2D,
        horizontal_step_size: grid_size, 
        vertical_step_size: grid_size,  
        image_path: jsPsych.timelineVariable('space_path'),
        image_format: 'webp',        
        canvas_shape: canvas_shape, 
        uncertainty_range: false,  
        data: {
            disp_type: 'reconstruction',
            key_feature: jsPsych.timelineVariable('key_feature'),
            position: jsPsych.timelineVariable('position'),
            label: jsPsych.timelineVariable('label'),
            answer_coord: jsPsych.timelineVariable('stim_coord'),
            answer: jsPsych.timelineVariable('stim_idx'),
            space_rotation: space_rot
        }  
    }
    for(r=0; r<n_block; r++){
        this['test_main'+(r+1)] = {
            timeline: [fixation, target_display, blank, reconstruction],
            timeline_variables: econd.memory['b'+(r+1)],
            randomize_order: true
        }
    }
    for(r=0; r<n_block; r++){
        this['transfer_main'+(r+1)] = {
            timeline: [fixation, target_display, blank, reconstruction],
            timeline_variables: econd.transfer_memory['b'+(r+1)],
            randomize_order: true
        }
    }
    for(r=0; r<n_block; r++){     
        if(r!=(n_block-1)){
            this['test_main_break'+(r+1)] = {                
                type: jsPsychHtmlButtonResponse,
                stimulus: '<div style="font-size:20px;">This is the end of round '+(r+1)+'.</br>'+
                'You have '+(n_block-r-1)+' more round(s) to go.</br>'+
                'Take a break and press the button to proceed.</br></br></div>',                    
                choices: ['start'],
                data: {disp_type: 'learning_main_break'}
            }
        } else {
            this['test_main_break'+(r+1)] = {                
                type: jsPsychHtmlButtonResponse,
                stimulus: '<div style="font-size:20px;">This is the end of round'+(r+1)+'.</br>'+
                'Take a break and press the button to proceed.</br></br></div>',                    
                choices: ['start'],
                data: {disp_type: 'learning_main_break'}
            }

        }                       
    }

    // ** reconstruction prac ** //
    var test_prac = {
        timeline: [fixation, target_display, blank, reconstruction],
        timeline_variables: pcond.memory.b1.slice(0, 3),
    }
    var test_prac2main = {
        type: jsPsychHtmlButtonResponse,
        stimulus: '<div style="font-size:20px;">Practice is done. Now move on to the main trials.</div>',
        choices: ['start'],
        data: {disp_type: 'test_pract2main'}
    }

    // ** transfer learn ** //    
    var transfer_learning = {
        timeline: [fixation, learn_display], // without feedback
        timeline_variables: econd.transfer_learning.b1,
        randomize_order: true
    };

    // ** consent ** //
    var consent = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function(){                            
          var html = 
          '<p area-selected="font-size:15px;"> Press Agree to participate in the experiment.</p>'+  
          '<embed src="stimuli/연구참여동의서.pdf" style="width:80vw; height:70vh;"></embed>'
          return html;
        },
        choices: ['Agree'],        
        data: {disp_type: 'consent_page'}   
    }

    // ** demographic page ** //
    var gender_options = ['Male', 'Female', 'Other'];
    var handed_option = ['Right', 'Left', 'ambidextrous'];
    var demographic_page = {
        type: jsPsychSurveyHtmlForm,
        preamble: '<p><b>Before starting, we would like to collect basic information below.</b></p>',
        html: '<p style="font-size:12pt;"> Gender: '+
            '<input name="gender" type="radio" value="male"  required/><label for="male">Male</label>'+
            '<input name="gender" type="radio" value="female"  required/><label for="female">Female</label>'+
            '<input name="gender" type="radio" value="other"  required/><label for="other">Other</label></br>'+
            // age
            'Age: <input name="age" type="text"/></br>'+
            // lenses
            '</br>Do you wear corrective lenses?: '+
            '<input name="lense" type="radio" value="yes" required/><label for="yes">Yes</label>'+
            '<input name="lense" type="radio" value="no" required/><label for="no">No</label>'+
            '</br>If yes, specify glasses or contacts:  <input name="lensetype" type="text" /></br>'+                
            // color blindness
            '</br>Do you experience color blindness?: '+
            '<input name="color" type="radio" value="yes" required/><label for="yes">Yes</label>'+
            '<input name="color" type="radio" value="no" required/><label for="no">No</label></br>'+
            // neurological conditions
            '</br>Do you have (or have you had) any neurological conditions?: '+
            '<input name="neuro" type="radio" value="yes" required/><label for="yes">Yes</label>'+
            '<input name="neuro" type="radio" value="no" required/><label for="no">No</label>'+
            '</br>If yes, please specify type and location: <input name="neurotype" type="text" /></br></p>',
        data: {
            disp_type: 'demographic_info'
        }
    }

    // ** blank ** //
    var blank = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: " ",
        choices: "NO_KEYS",
        trial_duration: 1000,
        data: {disp_type: 'blank'}
    }

    // ** debrief question  ** //
    var survey = {
        type: jsPsychSurveyText,
        preamble: "<p><b>All sessions are over! Thanks for participating.</br>"+
            "We'll appreciate it if you share your participation experience below.</b></p>",
        questions: [
            {prompt: 'Do you have any guess about the purpose of this study is?', name: 'Purpose', rows: 5},
            {prompt: 'Did you use any rules when classifying the rooms? If yes, please describe it.', name: 'Rule', rows: 5},
            {prompt: 'If you have any other feedback about this experiment, please tell us!', name: 'Feedback', rows: 5}
        ],
        data: {disp_type: 'hypothesis_guess'}
    }      

    var save_data = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<p>We are saving your data. Do not leave this page.</p>',
      choices: "NO_KEYS",
      trial_duration: 3000,
      data: { // random rotation angle saving                
          disp_type: 'saving_display'
      },            
      on_finish: function(){  
        // jsPsych.data.displayData() 
        // send data to firebase!  
        const now = new Date();                               
        const timestamp =
            now.getFullYear().toString() +
            String(now.getMonth() + 1).padStart(2, '0') +
            String(now.getDate()).padStart(2, '0') +
            String(now.getHours()).padStart(2, '0') +
            String(now.getMinutes()).padStart(2, '0') +
            String(now.getSeconds()).padStart(2, '0') +
            String(now.getMilliseconds()).padStart(3, '0');
        
        const save_id = timestamp + "_" + Math.floor(Math.random()*10000);
